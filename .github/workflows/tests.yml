name: Tests

on:
  pull_request:
  push:

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - binary:stable
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-24.04
            glib_prefix: /opt/glib
            pkg_config_path: /opt/glib/lib/x86_64-linux-gnu/pkgconfig:/opt/glib/lib/pkgconfig
            ld_library_path: /opt/glib/lib/x86_64-linux-gnu:/opt/glib/lib
          - os: macos-latest
            glib_prefix: /usr/local
            pkg_config_path: /usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/usr/local/opt/libffi/lib/pkgconfig
          - os: windows-latest
            glib_prefix: C:/msys64/mingw64
            pkg_config_path: C:/msys64/mingw64/lib/pkgconfig
    env:
      GLIB_PREFIX: ${{ matrix.glib_prefix }}
      PKG_CONFIG_PATH: ${{ matrix.pkg_config_path }}
      LD_LIBRARY_PATH: ${{ matrix.ld_library_path || '' }}
    steps:
    - uses: actions/checkout@v4

    - uses: extractions/setup-just@v2

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install apache-arrow-glib pkg-config ninja

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        cache: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-glib2
          mingw-w64-x86_64-arrow
          mingw-w64-x86_64-git
          mingw-w64-x86_64-nim
          mingw-w64-x86_64-nimble

    - name: Add LLVM repository
      if: runner.os == 'Linux'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22

    - name: Install Clang 22
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install -y clang-22 libclang-22-dev
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-22 100

    - name: Cache GLib 2.86
      if: runner.os == 'Linux'
      id: cache-glib
      uses: actions/cache@v4
      with:
        path: /opt/glib
        key: ${{ runner.os }}-glib-2.86.4

    - name: Build GLib 2.86.4
      if: runner.os == 'Linux' && steps.cache-glib.outputs.cache-hit != 'true'
      env:
        GLIB_VERSION: "2.86.4"
        PCRE2_VERSION: "10.44"
      run: |
        sudo apt-get install -y ninja-build python3-pip libz-dev
        sudo pip3 install meson --break-system-packages

        cd /tmp

        # libffi
        wget -q https://github.com/libffi/libffi/releases/download/v3.4.8/libffi-3.4.8.tar.gz
        tar xzf libffi-3.4.8.tar.gz
        cd libffi-3.4.8
        ./configure --prefix=$GLIB_PREFIX
        make -j$(nproc)
        sudo make install
        cd /tmp

        # PCRE2
        wget -q https://github.com/PCRE2Project/pcre2/releases/download/pcre2-${PCRE2_VERSION}/pcre2-${PCRE2_VERSION}.tar.gz
        tar xzf pcre2-${PCRE2_VERSION}.tar.gz
        cd pcre2-${PCRE2_VERSION}
        ./configure --prefix=$GLIB_PREFIX --enable-jit --disable-static
        make -j$(nproc)
        sudo make install
        cd /tmp

        # GLib
        wget -q https://download.gnome.org/sources/glib/2.86/glib-${GLIB_VERSION}.tar.xz
        tar xJf glib-${GLIB_VERSION}.tar.xz
        cd glib-${GLIB_VERSION}
        meson setup build \
          --prefix=$GLIB_PREFIX \
          --default-library=shared \
          -Dtests=false \
          -Dlibmount=disabled
        ninja -C build
        sudo ninja -C build install

    - name: Install Apache Arrow repository
      if: runner.os == 'Linux'
      run: |
        wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get install -y ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get update

    - name: Cache apt packages
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: libclang-dev libarrow-dev libarrow-glib-dev libarrow-dataset-glib-dev libparquet-glib-dev libgirepository1.0-dev pkg-config
        version: 1.0

    - name: Cache Nim
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ~/nimdir
          ~/.nimble
          ~/.cache/nim
        key: ${{ runner.os }}-nim-${{ matrix.version }}-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nim-${{ matrix.version }}-
          ${{ runner.os }}-nim-

    - uses: iffy/install-nim@v5
      if: runner.os != 'Windows'
      with:
        version: ${{ matrix.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify installations (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "=== Arrow Libraries ==="
        pkg-config --modversion arrow || echo "arrow not found"
        pkg-config --modversion arrow-glib || echo "arrow-glib not found"
        pkg-config --modversion arrow-dataset-glib || echo "arrow-dataset-glib not found"
        echo "=== Parquet ==="
        pkg-config --modversion parquet-glib || echo "parquet-glib not found"
        echo "=== GObject ==="
        pkg-config --modversion gobject-2.0
        echo "=== GLib ==="
        pkg-config --modversion glib-2.0
        echo "=== Clang ==="
        clang --version || echo "clang not found"
        echo "=== Include paths ==="
        pkg-config --cflags-only-I arrow-glib arrow-dataset-glib parquet-glib gobject-2.0 glib-2.0
        echo "=== Library paths ==="
        pkg-config --libs arrow-glib arrow-dataset-glib parquet-glib

    - name: Verify installations (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        echo "=== Arrow Libraries ==="
        pkg-config --modversion arrow || echo "arrow not found"
        pkg-config --modversion arrow-glib || echo "arrow-glib not found"
        echo "=== Parquet ==="
        pkg-config --modversion parquet-glib || echo "parquet-glib not found"
        echo "=== GObject ==="
        pkg-config --modversion gobject-2.0
        echo "=== GLib ==="
        pkg-config --modversion glib-2.0
        echo "=== GCC ==="
        gcc --version
        echo "=== Nim ==="
        nim --version
        echo "=== Include paths ==="
        pkg-config --cflags-only-I arrow-glib parquet-glib gobject-2.0 glib-2.0
        echo "=== Library paths ==="
        pkg-config --libs arrow-glib parquet-glib

    - name: Install Nim dependencies (Unix)
      if: runner.os != 'Windows'
      run: nimble install -y

    - name: Install Nim dependencies (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: nimble install -y

    - name: Test (Linux with sanitizers)
      if: runner.os == 'Linux'
      run: LSAN_OPTIONS="suppressions=lsan.supp:print_suppressions=0" nimble test -d:useSanitizers

    - name: Test (macOS)
      if: runner.os == 'macOS'
      run: nimble test

    - name: Test (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: nimble test
